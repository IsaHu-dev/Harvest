{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- Main Section Start -->
<div class="main-section">
    <div class="page-section nopadding cs-nomargin"style="padding-top: 200px; padding-bottom: 150px; margin-bottom: 0px; 
                background: url('{% static "extra-images/bg-image1.jpg" %}') no-repeat center / cover;">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                    <div class="main-header">
                        <h1>
                           Harvest your local restaurants<br>Find your favourite hotspot for food
                        </h1>
                        <p class="main-subtitle">
                            Ridiculus sociosqu cursus neque cursus curae ante scelerisque vehicula.
                        </p>
                    </div>
                </div>
                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                    <div class="main-search fancy bg-holder">
                        <form>
                            <div class="row">
                                <div class="col-lg-6 col-md-6 col-sm-5 col-xs-12">
                                    <div class="field-holder">
                                        <input type="text" placeholder="Restaurant name">
                                    </div>
                                </div>
                                <div class="col-lg-4 col-md-4 col-sm-5 col-xs-12">
                                    <div class="field-holder">
                                        <ul>
                                            <li class="select-location">
                                                <div class="harvest-locations-fields-group harvest-focus-out">
                                                    <span class="harvest-search-location-icon"><i class="icon-location"></i></span>
                                                    <span id="harvest_radius_location_open333" class="harvest-radius-location"><i class="icon-target5"></i></span>
                                                    <input type="text" class="location-field-text filter" placeholder="All Locations">
                                                </div>
                                                <div class="select-location" id="harvest-radius-range333" style="display: none;">
                                                    <div class="select-popup popup-open">
                                                        <a id="location_close_popup333" href="javascript:void(0);" class="location-close-popup">
                                                            <i class="icon-times"></i>
                                                        </a>
                                                        <input type="hidden" class="harvest-radius" name="harvest_radius" value="10">
                                                        <p>Show within</p>
                                                        <input id="ex16b333" type="text" data-value="10" value="10" style="display: none;">
                                                        <script>
                                                            jQuery(document).ready(function () {
                                                                var elem = jQuery("#ex16b333");
                                                                if (elem.length != "") {
                                                                    elem.slider({
                                                                        step: 1,
                                                                        min: 0,
                                                                        max: 500,
                                                                        value: 10,
                                                                    });
                                                                    elem.on("slideStop", function () {
                                                                        var rang_slider_val = elem.val();
                                                                        jQuery("#ex16b333CurrentSliderValLabel").html(rang_slider_val);
                                                                        jQuery("#range-hidden-harvest-radius333").val(rang_slider_val);
                                                                    });
                                                                    elem.on("slide", function () {
                                                                        jQuery("#ex16b333CurrentSliderValLabel").html(elem.val());
                                                                    });
                                                                }

                                                                $("#harvest_radius_location_open333").click(function () {
                                                                    $("#harvest-radius-range333").show();
                                                                });
                                                                $("#location_close_popup333").click(function () {
                                                                    $("#harvest-radius-range333").hide();
                                                                });
                                                            });
                                                        </script>
                                                        <span>Miles: <span id="ex16b333CurrentSliderValLabel">10</span></span><br>
                                                        <p class="my-location">of <i class="cs-color icon-location-arrow"></i><a id="harvest-geo-location-all" class="cs-color harvest-geo-location313324" href="javascript:void(0)">My location</a></p>
                                                    </div>
                                                </div>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                                <div class="col-lg-2 col-md-2 col-sm-2 col-xs-12">
                                    <div class="field-holder">
                                        <input type="submit" value="Search">
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
